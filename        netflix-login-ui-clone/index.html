<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Login UI clone</title>
    <link rel="stylesheet" href="./style/main.css">
</head>
<body>
    <main class="main"> 
 
        <img src="https://assets.nflxext.com/ffe/siteui/vlv3/77d35039-751f-4c3e-9c8d-1240c1ca6188/44d46e27-4cc5-4068-bd52-77beac9f459c/KG-ru-20231106-popsignuptwoweeks-perspective_alpha_website_large.jpg"  
        class="main__img" 
        alt=""> 
        <h1 class="main__logo">NETFLIX</h1> 

        <div class="main__form"> 
            <div class="main__form-item"> 
                <input type="text" placeholder="Адрес эл. почты или номер телефона"> 
                <input type="password" placeholder="Пароль" > 
                <button>Войти</button> 
                <span class="main__form-item-span"> 
                    <p><input type="checkbox">Запомнить меня</p> 
                    <a href="#">Нужно помощь?</a> 
                </span> 
                <p> 
                    Впервые на Netflix? <a href="#">Зарегистрируйтесь сейчас.</a> 
                </p> 
                <span class="main__form-item-bottom"> 
                    Эта страница защищена Google reCAPTCHA, чтобы мы знали, что вы не бот. <a href="$"> Подробнее.</a> 
             </span> 
            </div> 
        </div> 

    </main> 
    
</body>
</html>
